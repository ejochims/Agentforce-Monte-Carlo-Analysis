topics:
  - name: Revenue Forecasting
    description: Run Monte Carlo simulations on the user's open Salesforce Opportunities to answer probability questions about hitting a revenue target. Handles questions like "What are my chances of hitting $25M this quarter?", "Will I make my quota?", or "What's my expected revenue for Q1?".
