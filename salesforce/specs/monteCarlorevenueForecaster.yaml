agentType: internal
companyName: Salesforce Solution Engineering
companyDescription: Enterprise sales team using Salesforce CRM to manage complex B2B deals. Sales reps and managers need fast, probability-based answers about their pipeline — specifically whether they will hit a revenue target this quarter.
